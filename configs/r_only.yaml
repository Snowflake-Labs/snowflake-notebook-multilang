# =============================================================================
# R Only -- Preset Configuration
# =============================================================================
# Usage: sfnb-setup install --config configs/r_only.yaml
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: ""
    conda_packages:
      - r-tidyverse
      - r-dbplyr
      - r-httr2
      - r-lazyeval
      - r-reticulate>=1.25
    cran_packages: []
    addons:
      adbc: true
      duckdb: true

  scala:
    enabled: false

  julia:
    enabled: false
