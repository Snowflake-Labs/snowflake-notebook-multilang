# =============================================================================
# snowflakeR -- ML Platform Preset
# =============================================================================
# Full R environment for the snowflakeR ML package (Model Registry, Feature
# Store, SPCS admin).  Includes tidyverse, dbplyr, and reticulate.
#
# Usage:
#   from sfnb_multilang import install
#   install(config="configs/snowflaker.yaml")
#
#   # or CLI:
#   sfnb-setup install --config configs/snowflaker.yaml
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: ""
    conda_packages:
      - r-tidyverse
      - r-dbplyr
      - r-httr2
      - r-lazyeval
      - r-reticulate>=1.25
    cran_packages: []
    addons:
      adbc: false
      duckdb: false

  scala:
    enabled: false

  julia:
    enabled: false
