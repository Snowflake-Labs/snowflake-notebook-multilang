# =============================================================================
# Snowflake Notebook Multi-Language Toolkit -- Default Configuration
# =============================================================================
# All languages enabled with sensible defaults.
#
# Usage:
#   sfnb-setup install --config configs/default.yaml
#   sfnb-setup install --config configs/default.yaml --verbose
# =============================================================================

env_name: "workspace_env"
micromamba_root: "~/micromamba"
force_reinstall: false

# ---------------------------------------------------------------------------
# Languages
# ---------------------------------------------------------------------------
# IMPORTANT: r_version should always be pinned to a known-good conda-forge
# release.  After a new R release, conda-forge needs 2-4 weeks to rebuild
# all downstream R packages.  An unconstrained install may pull a version
# whose packages are not yet available, causing SPCS inference failures.
# The installer warns if the installed R build is < 30 days old.
# ---------------------------------------------------------------------------
languages:
  r:
    enabled: true
    r_version: "4.5.2"   # pin to known-good conda-forge R; bump when packages are rebuilt
    conda_packages:
      - r-tidyverse
      - r-dbplyr
      - r-httr2
      - r-lazyeval
      - r-reticulate>=1.25
    cran_packages: []
    addons:
      adbc: false
      duckdb: false

  scala:
    enabled: true
    java_version: "17"
    scala_version: "2.12"
    snowpark_version: "1.18.0"
    ammonite_version: "3.0.8"
    jvm_heap: "auto"
    jvm_options:
      - "-Xms256m"
      - "--add-opens=java.base/java.nio=ALL-UNNAMED"
    extra_dependencies:
      - "org.slf4j:slf4j-nop:1.7.36"
    spark_connect:
      enabled: false
      pyspark_version: "3.5.6"
      server_port: 15002

  julia:
    enabled: true
    julia_version: ""
    julia_packages:
      - DataFrames
      - CSV
      - Arrow
      - Statistics
      - LinearAlgebra
      - PythonCall
    depot_path: "auto"
    snowflake_odbc:
      enabled: false
      driver_version: "3.15.0"
    sysimage:
      enabled: false
      packages:
        - DataFrames
        - CSV
        - Arrow
    juliacall:
      threads: "auto"
      optimize: 2
      handle_signals: true
      startup_file: false

# ---------------------------------------------------------------------------
# Network Rules
# ---------------------------------------------------------------------------
network_rule:
  apply_in_installer: true
  account: ""
  rule_name: multilang_notebook_egress
  integration_name: multilang_notebook_eai
  grant_to_role: ""
  sql_export_path: ./eai_setup.sql

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  log_file: ""
  json_format: false
