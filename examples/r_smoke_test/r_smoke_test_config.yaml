# =============================================================================
# R Smoke Test -- Combined Dependencies
# =============================================================================
# Installs R with dependencies for both snowflakeR and RSnowflake.
# No ADBC/DuckDB to keep the install fast (~3 min).
#
# Usage:
#   from sfnb_setup import install_r
#   install_r(config="r_smoke_test_config.yaml")
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      # Shared
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      # snowflakeR
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      # RSnowflake
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-dplyr>=1.1.0
    cran_packages: []
    addons:
      adbc: false
      duckdb: false

  scala:
    enabled: false

  julia:
    enabled: false

# Optional: specify how to obtain R package tarballs.
# Each entry can be a URL, a local path, or omitted entirely.
#
#   URL        -> downloaded via R's download.file(), then installed
#   Local path -> installed directly (relative to Workspace root)
#   Omitted    -> Workspace is searched recursively; if not found,
#                 falls back to GitHub install via pak
#
# Core packages (snowflakeR and RSnowflake) have built-in fallback.
# Additional packages listed here are installed in order.
#
# tarballs:
#   snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.1.0/snowflakeR_0.1.0.tar.gz"
#   RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"
#   myPackage:  "https://example.com/myPackage_1.0.0.tar.gz"
#   localPkg:   "libs/localPkg_2.0.0.tar.gz"
